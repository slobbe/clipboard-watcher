name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    check:
        name: JavaScript quality
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: npm
            - run: npm ci
            - run: make check
            - run: make lint
            - run: make format-check

    shexli:
        name: GNOME extension review
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
            - run: python -m pip install shexli==0.2.1
            - run: make zip
            - name: Run shexli
              run: shexli dist/clipboard-watcher@slobbe.github.io.zip --format json > shexli.json
            - name: Summarize shexli findings
              if: always()
              run: |
                  {
                      echo "## shexli"
                      jq -r '.summary.severity_counts | to_entries[] | "- \(.key): \(.value)"' shexli.json
                  } >> "$GITHUB_STEP_SUMMARY"
            - name: Annotate shexli findings
              if: always()
              run: |
                  jq -r '
                      .findings[]
                      | . as $finding
                      | .evidence[]?
                      | [$finding.severity, $finding.rule_id, $finding.message, .path, (.line | tostring)]
                      | @tsv
                  ' shexli.json | while IFS=$'\t' read -r severity rule message path line; do
                      file="${path#*:}"
                      if [ "$file" != "metadata.json" ]; then
                          file="src/$file"
                      fi

                      case "$severity" in
                          error) annotation=error ;;
                          warning) annotation=warning ;;
                          *) annotation=notice ;;
                      esac

                      printf '::%s file=%s,line=%s::[%s] %s\n' "$annotation" "$file" "$line" "$rule" "$message"
                  done
